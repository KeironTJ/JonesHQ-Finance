<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Indigo background circle -->
  <circle cx="16" cy="16" r="16" fill="#4f46e5"/>
  <!-- Ascending bar chart (3 bars, left to right, getting taller) -->
  <rect x="5"  y="21" width="5" height="6"  rx="1" fill="white"/>
  <rect x="13" y="15" width="5" height="12" rx="1" fill="white"/>
  <rect x="21" y="9"  width="5" height="18" rx="1" fill="white"/>
  <!-- Upward trend line across the tops of bars -->
  <polyline points="7.5,21 15.5,15 23.5,9" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
